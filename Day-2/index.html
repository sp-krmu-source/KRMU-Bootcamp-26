<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 5fr 2fr 2fr 2fr;
            height:700px;
        }
        .box{
            background-color: tomato;
            border: 2px solid black;
            box-shadow: rgba(0, 0, 0, 0.25) 0px 14px 28px, rgba(0, 0, 0, 0.22) 0px 10px 10px;
        }
        .header{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .menu{
            grid-column: 2/5;
            grid-row: 1/2;
        }
        .hero{
            grid-column: 1/5;
            grid-row: 2/3;
        }
        .main{
            grid-column: 1/3;
            grid-row: 3/5;
        }
        .image{
            grid-column: 4/5;
            grid-row: 3/4;
        }
        .extra{
            grid-column: 4/5;
            grid-row: 4/5;
        }
        .banner{
            grid-column: 1/5;
            grid-row: 5/6;
        }
        

    </style>
  </head>
  <body>
    <div class="grid">
      <div class="box header"></div>
      <div class="box menu"></div>
      <div class="box hero"></div>
      <div class="box main"></div>
      <div class="box image"></div>
      <div class="box extra"></div>
      <div class="box banner"></div>
    </div>
  </body>
</html>
